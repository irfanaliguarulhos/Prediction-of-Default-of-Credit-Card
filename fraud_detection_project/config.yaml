# Banking Fraud Detection Configuration

# Data Paths
data:
  raw_path: "data/raw/"
  bronze_path: "data/bronze/"
  silver_path: "data/silver/"
  gold_path: "data/gold/"
  feature_store_path: "data/features/"
  model_output_path: "models/"
  output_path: "output/"

# Spark Configuration
spark:
  app_name: "FraudDetection"
  master: "local[*]"
  executor_memory: "4g"
  driver_memory: "2g"
  num_executors: 4
  shuffle_partitions: 200

# Data Ingestion
ingestion:
  schema_enforcement: true
  merge_schema: true
  partition_by: "event_date"
  watermark_delay: "2 hours"
  checkpoint_location: "data/checkpoints/ingestion/"

# Feature Engineering
features:
  time_windows: [7, 30, 90]  # days
  aggregation_functions: ["sum", "count", "mean", "std"]
  graph_features:
    connected_components: true
    pagerank: true
    degree_centrality: true
  embeddings:
    node2vec_dim: 64
    behavioral_dim: 128
    combined_dim: 128

# Model Training
model:
  type: "lightgbm"  # lightgbm, xgboost, graphsage, transformer
  lightgbm:
    objective: "binary"
    metric: "aucpr"
    scale_pos_weight: 100
    is_unbalance: true
    learning_rate: 0.05
    num_leaves: 31
    feature_fraction: 0.8
    bagging_fraction: 0.8
    bagging_freq: 5
    n_estimators: 1000
    early_stopping_rounds: 50
  xgboost:
    objective: "binary:logistic"
    eval_metric: "aucpr"
    scale_pos_weight: 100
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    n_estimators: 1000
    early_stopping_rounds: 50
  graphsage:
    hidden_dim: 128
    output_dim: 64
    num_layers: 3
    aggregator: "mean"
    dropout: 0.3
    learning_rate: 0.001
    epochs: 50
  transformer:
    d_model: 128
    nhead: 8
    num_layers: 4
    dim_feedforward: 512
    dropout: 0.1
    sequence_length: 50

# Data Split
split:
  train_end_date: "2023-09-30"
  val_start_date: "2023-10-01"
  val_end_date: "2023-11-30"
  test_start_date: "2023-12-01"

# Class Imbalance Handling
imbalance:
  method: "class_weight"  # class_weight, focal_loss, smote
  focal_loss_gamma: 2.0
  sampling_ratio: 0.1  # negative to positive ratio

# Evaluation Metrics
evaluation:
  primary_metric: "pr_auc"
  secondary_metrics: ["roc_auc", "f1", "precision", "recall"]
  business_costs:
    false_negative_cost: 2500  # $ per missed fraud
    false_positive_cost: 15    # $ per false alarm
    manual_review_cost: 8      # $ per review
  threshold_optimization: true
  k_fold_cv: 5

# Hyperparameter Tuning
tuning:
  enabled: true
  method: "optuna"  # optuna, ray_tune, grid_search
  n_trials: 100
  timeout_hours: 12
  pruning: true
  cross_validation: true

# Explainability
explainability:
  shap_enabled: true
  shap_samples: 1000
  lime_enabled: false
  feature_importance_top_n: 20

# Deployment
serving:
  api_host: "0.0.0.0"
  api_port: 8000
  latency_target_ms: 50
  batch_size: 32
  model_format: "onnx"  # onnx, pickle, joblib
  feature_store_enabled: true
  caching_enabled: true
  cache_ttl_seconds: 300

# Monitoring
monitoring:
  enabled: true
  psi_threshold: 0.1
  ks_test_threshold: 0.05
  performance_drift_threshold: 0.05
  alert_email: "fraud-alerts@bank.com"
  check_frequency_hours: 1
  retrain_trigger:
    psi_exceeded: true
    performance_drop: true
    data_drift: true

# Testing
testing:
  unit_tests: true
  integration_tests: true
  ab_testing: true
  statistical_tests: true
  bootstrap_iterations: 1000
  confidence_level: 0.95

# Logging
logging:
  level: "INFO"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {message}"
  file: "output/logs/fraud_detection.log"
  rotation: "100 MB"
  retention: "30 days"

# Security
security:
  encrypt_pii: true
  access_control: true
  audit_logging: true
